# Standalone-Fetch: STIB (Belgian Mobility) + iRail (frei). SKELETON – Logik in Phase 2.
# Doku: ../../docs/05-stib-irail.md
# STIB nutzt KEIN OAuth2: nur Header  bmc-partner-key: !secret stib_partner_key

http_request:
  useragent: "ha-diele-board/0.1 (github.com/Nosdave/ha-diele-board)"
  timeout: 10s

globals:
  - id: transit_last_ok   # epoch der letzten erfolgreichen Aktualisierung
    type: int
    restore_value: no
    initial_value: '0'

